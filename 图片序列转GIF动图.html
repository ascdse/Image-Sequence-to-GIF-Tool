<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片序列合成 GIF - 离线版 (中/EN)</title>
  <style>
    :root {
      --bg: #1e1e2f;
      --panel: #2a2a3d;
      --text: #e0e0e0;
      --text-secondary: #aaa;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --border: #3f3f5c;
      --input-bg: #1a1a2a;
      --drop-bg: rgba(255,255,255,0.02);
      --preview-bg: rgba(0,0,0,0.15);
      --status-bg: rgba(255,255,255,0.05);
      --file-name-bg: rgba(0,0,0,0.3);
      --preview-size: 60px;
    }
    body.light-theme {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #333333;
      --text-secondary: #666666;
      --border: #e0e0e0;
      --input-bg: #f0f0f0;
      --drop-bg: rgba(0,0,0,0.02);
      --preview-bg: rgba(0,0,0,0.03);
      --status-bg: rgba(0,0,0,0.03);
      --file-name-bg: rgba(0,0,0,0.05);
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; padding: 2rem; margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      max-width: 1100px; width: 100%;
      display: flex; gap: 1.5rem; align-items: flex-start;
    }
    .preview-module, .settings-module {
      background: var(--panel); border-radius: 16px;
      padding: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: background 0.3s;
    }
    .preview-module { flex: 1.2; display: flex; flex-direction: column; }
    .settings-module { flex: 0.8; display: flex; flex-direction: column; }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 1.5rem; text-align: center; cursor: pointer;
      margin-bottom: 1rem; transition: 0.2s; background: var(--drop-bg);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent); background: rgba(108,99,255,0.05);
    }
    .file-count { margin: 0.5rem 0; color: var(--text-secondary); font-size: 0.85rem; }
    .preview-grid {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      max-height: 450px; overflow-y: auto; padding: 0.5rem;
      background: var(--preview-bg); border-radius: 8px;
      margin: 0.8rem 0; flex: 1;
    }
    .preview-item {
      display: flex; flex-direction: column; align-items: center;
      cursor: grab; transition: transform 0.15s, border-color 0.15s;
      border: 2px solid transparent; border-radius: 6px;
      padding: 2px; user-select: none;
    }
    .preview-item.dragging { opacity: 0.4; transform: scale(0.95); }
    .preview-item.drag-over { border-color: var(--accent); transform: scale(1.05); }
    .preview-item:active { cursor: grabbing; }
    .preview-item img {
      width: var(--preview-size); height: var(--preview-size);
      object-fit: cover; border-radius: 4px;
    }
    .preview-item .index {
      font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; text-align: center;
    }
    .preview-controls {
      display: flex; align-items: center; gap: 0.8rem; margin-top: 0.5rem;
    }
    .preview-controls label { font-size: 0.85rem; white-space: nowrap; }
    .preview-controls input[type="range"] { flex: 1; }

    .settings-module h2 {
      font-size: 1.1rem; margin: 0 0 1.2rem 0; font-weight: 500;
      color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;
    }
    .row {
      display: flex; align-items: center; gap: 0.8rem; margin: 0.8rem 0;
    }
    .row label { width: 100px; font-size: 0.85rem; flex-shrink: 0; }
    input, select {
      padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border);
      background: var(--input-bg); color: var(--text); flex: 1; min-width: 0;
      transition: background 0.3s, color 0.3s, border 0.3s;
    }
    .switch-row { display: flex; align-items: center; gap: 0.8rem; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { display: none; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border); transition: 0.3s; border-radius: 24px;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background-color: white;
      transition: 0.3s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(20px); }

    button {
      padding: 0.6rem 1rem; background: var(--accent);
      color: white; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; transition: 0.2s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .generate-btn {
      width: 100%; padding: 0.8rem; font-size: 1rem; margin-top: 1rem;
    }
    .status {
      margin-top: 1rem; padding: 0.5rem; text-align: center;
      border-radius: 8px; font-size: 0.85rem;
      background: var(--status-bg); transition: background 0.3s;
    }
    .status.loading { background: rgba(108,99,255,0.15); color: #b3b3ff; }
    .status.success { background: rgba(76,175,132,0.15); color: #81c784; }
    .status.error { background: rgba(224,108,117,0.15); color: #ef9a9a; }
    .file-name-preview {
      background: var(--file-name-bg); border-radius: 6px;
      padding: 0.4rem 0.8rem; font-size: 0.8rem; color: var(--text-secondary);
      text-align: center; margin: 0.5rem 0; transition: background 0.3s, color 0.3s;
    }
    .top-buttons {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 0.5rem; gap: 0.5rem;
    }
    .top-buttons button {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); display: flex; align-items: center; gap: 0.3rem;
    }
    .top-buttons button:hover { background: var(--border); }
    .hidden { display: none; }

    @media (max-width: 700px) {
      .container { flex-direction: column; }
      .preview-module, .settings-module { flex: none; width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 左侧预览模块 -->
  <div class="preview-module">
    <div class="drop-zone" id="dropZone">
      <p data-i18n="dropText">📁 拖放或点击选择图片（多选）</p>
      <p style="font-size:0.8rem; margin-top:0.4rem; color: var(--text-secondary);" data-i18n="supportFormats">支持 jpg, png, webp, bmp</p>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
      <div class="file-count" id="fileCount"></div>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
    <div class="preview-controls">
      <label data-i18n="previewSize">🔍 预览大小</label>
      <input type="range" id="previewSize" min="30" max="300" value="60">
      <span id="previewSizeVal" style="font-size:0.8rem;">60px</span>
    </div>
  </div>

  <!-- 右侧设置模块 -->
  <div class="settings-module">
    <!-- 主题 & 语言切换按钮组 -->
    <div class="top-buttons">
      <button id="langToggleBtn">
        <span id="langIcon">🌐</span> <span id="langText">EN</span>
      </button>
      <button id="themeToggleBtn">
        <span id="themeIcon">☀️</span> <span id="themeText">浅色</span>
      </button>
    </div>
    <h2 data-i18n="settingsTitle">⚙️ 合成设置</h2>
    <div class="row">
      <label data-i18n="fps">帧率 (fps)</label>
      <input type="number" id="fps" value="10" min="1" max="30">
    </div>
    <div class="row">
      <label data-i18n="quality">质量 (1-30)</label>
      <input type="range" id="quality" min="1" max="30" value="15">
      <span id="qualityVal" style="font-size:0.8rem;">15</span>
    </div>
    <div class="row">
      <label data-i18n="workers">线程数</label>
      <input type="number" id="workers" min="1" max="16" value="4" placeholder="自动">
      <span style="font-size:0.75rem; color: var(--text-secondary);" data-i18n="workersHint">建议4-8</span>
    </div>
    <div class="row">
      <label data-i18n="loopFrames">前N帧重复</label>
      <input type="number" id="loopFrames" value="0" min="0" max="999" step="1" placeholder="帧数">
      <span style="font-size:0.7rem; color: var(--text-secondary);" data-i18n="framesUnit">帧数</span>
    </div>
    <div class="row" style="margin-top:-0.3rem;">
      <label data-i18n="loopRepeat">重复次数</label>
      <input type="number" id="loopRepeat" value="1" min="1" max="99" step="1" placeholder="次数">
      <span style="font-size:0.7rem; color: var(--text-secondary);" data-i18n="repeatHint">(含原本)</span>
    </div>
    <h2 style="margin-top:1.5rem;" data-i18n="namingTitle">🏷️ 文件命名</h2>
    <div class="switch-row" style="margin-bottom: 0.5rem;">
      <label class="switch">
        <input type="checkbox" id="namingToggle" checked>
        <span class="slider"></span>
      </label>
      <span style="font-size:0.85rem;" data-i18n="enableNamingRule">启用命名规则</span>
    </div>
    <div id="ruleMode">
      <div class="row">
        <label data-i18n="baseName">基础名称</label>
        <input type="text" id="baseName" value="成品" maxlength="50">
      </div>
      <div class="row">
        <label data-i18n="startSeq">起始序号</label>
        <input type="number" id="startSeq" value="1" min="1" max="9999" step="1">
      </div>
      <div class="file-name-preview" id="fileNamePreviewRule"></div>
      <div style="display: flex; gap: 0.5rem;">
        <button id="resetNamingBtn" data-i18n="resetSeq">🔄 重置序号</button>
        <span style="font-size:0.7rem; color: var(--text-secondary); align-self:center;" data-i18n="resetHint">重置后下一个文件将从起始序号开始</span>
      </div>
    </div>
    <div id="fixedMode" class="hidden">
      <div class="row">
        <label data-i18n="fixedFileName">固定文件名</label>
        <input type="text" id="fixedFileName" value="动画" maxlength="50">
        <span style="font-size:0.7rem; color: var(--text-secondary);">.gif</span>
      </div>
      <div class="file-name-preview" id="fileNamePreviewFixed"></div>
    </div>

    <button id="generateBtn" class="generate-btn" disabled data-i18n="generateBtn">生成 GIF</button>
    <div class="status" id="status"></div>
  </div>
</div>

<!-- 离线本地 gif.js 主库 -->
<script src="gif.js"></script>

  (async function() {
    // ========================
    // 国际化 (i18n)
    // ========================

      zh: {
        dropText: '📁 拖放或点击选择图片（多选）',
        supportFormats: '支持 jpg, png, webp, bmp',
        previewSize: '🔍 预览大小',
        settingsTitle: '⚙️ 合成设置',
        fps: '帧率 (fps)',
        quality: '质量 (1-30)',
        workers: '线程数',
        workersHint: '建议4-8',

        framesUnit: '帧数',
        loopRepeat: '重复次数',
        repeatHint: '(含原本)',
        namingTitle: '🏷️ 文件命名',
        enableNamingRule: '启用命名规则',
        baseName: '基础名称',
        startSeq: '起始序号',
        resetSeq: '🔄 重置序号',
        resetHint: '重置后下一个文件将从起始序号开始',
        fixedFileName: '固定文件名',
        generateBtn: '生成 GIF',
        themeLight: '浅色',
        themeDark: '深色',
        langSwitch: 'EN',
        fileCountBase: '已选 {count} 张图片 (拖拽可排序)',
        fileNamePreviewRule: '当前将命名为：{name}({seq}).gif',

        statusSuccess: '✅ 成功！({size} KB)',
        statusError: '❌ 生成失败: {message}',
      },
      en: {
        dropText: '📁 Drag & drop or click to select images (multi-select)',
        supportFormats: 'Supports jpg, png, webp, bmp',
        previewSize: '🔍 Preview Size',
        settingsTitle: '⚙️ Settings',
        fps: 'Frame Rate (fps)',
        quality: 'Quality (1-30)',
        workers: 'Workers',
        workersHint: 'Recommended 4-8',
        loopFrames: 'Repeat First N Frames',
        framesUnit: 'frames',
        loopRepeat: 'Repeat Times',
        repeatHint: '(including original)',
        namingTitle: '🏷️ File Naming',
        enableNamingRule: 'Enable Naming Rule',
        baseName: 'Base Name',
        startSeq: 'Start Index',
        resetSeq: '🔄 Reset Index',
        resetHint: 'Reset to start index for the next file',
        fixedFileName: 'Fixed Name',
        generateBtn: 'Generate GIF',
        themeLight: 'Light',
        themeDark: 'Dark',
        langSwitch: '中文',
        fileCountBase: '{count} images selected (drag to reorder)',
        fileNamePreviewRule: 'Will be named: {name}({seq}).gif',
        fileNamePreviewFixed: 'Will be named: {name}.gif',
        statusLoading: '⏳ Loading images...',
        statusProcessing: '⏳ Processing ({workers} workers)...',
        statusAddingFrames: '⏳ Adding frame {current}/{total}...',
        statusSuccess: '✅ Done! ({size} KB)',
        statusError: '❌ Failed: {message}',
      }
    };

    let currentLang = 'zh';

    function t(key, params = {}) {
      let text = translations[currentLang][key] || key;
      for (const [k, v] of Object.entries(params)) {
        text = text.replace(`{${k}}`, v);
      }
      return text;
    }

    function applyLanguage() {
      // 更新所有带 data-i18n 的元素
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });
      // 特殊元素：语言切换按钮文字
      document.getElementById('langText').textContent = currentLang === 'zh' ? 'EN' : '中文';
      // 更新动态内容
      updateFileCountText();
      updateFileNamePreview();
      // 主题按钮文字
      updateThemeButtonText();
    }

    // 语言切换按钮
    const langToggleBtn = document.getElementById('langToggleBtn');
    langToggleBtn.addEventListener('click', () => {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLanguage();
    });

    // ========================
    // 主题切换
    // ========================
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    const themeText = document.getElementById('themeText');

    function updateThemeButtonText() {
      if (document.body.classList.contains('light-theme')) {
        themeIcon.textContent = '🌙';
        themeText.textContent = t('themeDark');
      } else {
        themeIcon.textContent = '☀️';
        themeText.textContent = t('themeLight');
      }
    }

    function setTheme(isLight) {
      if (isLight) {
        document.body.classList.add('light-theme');
      } else {
        document.body.classList.remove('light-theme');
      }
      updateThemeButtonText();
    }

    setTheme(false);
    themeToggleBtn.addEventListener('click', () => {
      const isLight = document.body.classList.contains('light-theme');
      setTheme(!isLight);
    });

    // ========================
    // DOM 元素
    // ========================
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileCountDiv = document.getElementById('fileCount');
    const previewGrid = document.getElementById('previewGrid');
    const previewSizeInput = document.getElementById('previewSize');
    const previewSizeVal = document.getElementById('previewSizeVal');
    const generateBtn = document.getElementById('generateBtn');
    const fpsInput = document.getElementById('fps');
    const qualityInput = document.getElementById('quality');
    const qualityVal = document.getElementById('qualityVal');
    const workersInput = document.getElementById('workers');
    const loopFramesInput = document.getElementById('loopFrames');
    const loopRepeatInput = document.getElementById('loopRepeat');
    const statusDiv = document.getElementById('status');
    const namingToggle = document.getElementById('namingToggle');
    const ruleModeDiv = document.getElementById('ruleMode');
    const fixedModeDiv = document.getElementById('fixedMode');
    const baseNameInput = document.getElementById('baseName');
    const startSeqInput = document.getElementById('startSeq');
    const fileNamePreviewRule = document.getElementById('fileNamePreviewRule');
    const resetNamingBtn = document.getElementById('resetNamingBtn');
    const fixedFileNameInput = document.getElementById('fixedFileName');
    const fileNamePreviewFixed = document.getElementById('fileNamePreviewFixed');

    let selectedFiles = [];
    let currentSequence = parseInt(startSeqInput.value) || 1;

    // 命名模式UI更新
    function updateNamingUI() {
      const isRule = namingToggle.checked;
      if (isRule) {
        ruleModeDiv.classList.remove('hidden');
        fixedModeDiv.classList.add('hidden');
      } else {
        ruleModeDiv.classList.add('hidden');
        fixedModeDiv.classList.remove('hidden');
      }
      updateFileNamePreview();
    }

    function updateFileNamePreview() {
      if (namingToggle.checked) {
        const name = baseNameInput.value.trim() || (currentLang==='zh'?'未命名':'Untitled');
        fileNamePreviewRule.textContent = t('fileNamePreviewRule', { name: name, seq: currentSequence });
      } else {
        const name = fixedFileNameInput.value.trim() || (currentLang==='zh'?'未命名':'Untitled');
        fileNamePreviewFixed.textContent = t('fileNamePreviewFixed', { name: name });
      }
    }

    function resetSequence() {
      currentSequence = parseInt(startSeqInput.value) || 1;
      updateFileNamePreview();
    }

    function getNextFileName() {
      if (namingToggle.checked) {
        const name = baseNameInput.value.trim() || (currentLang==='zh'?'未命名':'Untitled');
        const fileName = `${name}(${currentSequence}).gif`;
        currentSequence++;
        updateFileNamePreview();
        return fileName;
      } else {
        const name = fixedFileNameInput.value.trim() || (currentLang==='zh'?'未命名':'Untitled');
        return `${name}.gif`;
      }
    }

    function updateFileCountText() {
      const count = selectedFiles.length;
      fileCountDiv.textContent = t('fileCountBase', { count: count });
    }

    namingToggle.addEventListener('change', updateNamingUI);
    baseNameInput.addEventListener('input', updateFileNamePreview);
    startSeqInput.addEventListener('input', () => { updateFileNamePreview(); });
    fixedFileNameInput.addEventListener('input', updateFileNamePreview);
    resetNamingBtn.addEventListener('click', resetSequence);

    // 预览大小控制
    previewSizeInput.addEventListener('input', () => {
      const size = previewSizeInput.value + 'px';
      previewSizeVal.textContent = size;
      document.documentElement.style.setProperty('--preview-size', size);
    });

    qualityInput.addEventListener('input', () => qualityVal.textContent = qualityInput.value);

    // 渲染预览（拖拽排序）
    function renderPreview() {
      previewGrid.innerHTML = '';
      selectedFiles.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        item.draggable = true;
        item.setAttribute('data-index', index);

        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.alt = file.name;
        img.draggable = false;

        const span = document.createElement('span');
        span.className = 'index';
        span.textContent = index + 1;

        item.appendChild(img);
        item.appendChild(span);

        item.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', index.toString());
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          document.querySelectorAll('.preview-item').forEach(el => el.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
          const toIndex = parseInt(item.getAttribute('data-index'));
          if (!isNaN(fromIndex) && !isNaN(toIndex) && fromIndex !== toIndex) {
            [selectedFiles[fromIndex], selectedFiles[toIndex]] = [selectedFiles[toIndex], selectedFiles[fromIndex]];
            renderPreview();
            updateFileCountText();
            generateBtn.disabled = selectedFiles.length === 0;
          }
          item.classList.remove('drag-over');
        });

        previewGrid.appendChild(item);
      });
    }

    function updateFiles(files) {
      selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      selectedFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
      renderPreview();
      updateFileCountText();
      generateBtn.disabled = selectedFiles.length === 0;
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => updateFiles(e.target.files));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      updateFiles(e.dataTransfer.files);
    });

    // 生成 GIF
    generateBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      const fps = parseInt(fpsInput.value) || 10;
      const quality = parseInt(qualityInput.value) || 15;
      const delay = Math.round(1000 / fps);
      let workerCount = parseInt(workersInput.value);
      if (isNaN(workerCount) || workerCount < 1) {
        workerCount = Math.max(1, (navigator.hardwareConcurrency || 4) - 1);
      }
      const loopFramesNum = parseInt(loopFramesInput.value) || 0;
      const loopRepeat = parseInt(loopRepeatInput.value) || 1;

      let finalFiles = [...selectedFiles];
      if (loopFramesNum > 0 && loopFramesNum <= selectedFiles.length && loopRepeat > 1) {
        const head = selectedFiles.slice(0, loopFramesNum);
        const tail = selectedFiles.slice(loopFramesNum);
        finalFiles = [];
        for (let i = 0; i < loopRepeat; i++) finalFiles.push(...head);
        finalFiles.push(...tail);
      }

      statusDiv.textContent = t('statusLoading');
      statusDiv.className = 'status loading';
      generateBtn.disabled = true;

      try {
        const images = await Promise.all(finalFiles.map(file => {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
          });
        }));

        const targetW = images[0].naturalWidth;
        const targetH = images[0].naturalHeight;

        const gifOptions = {
          quality: Math.min(30, Math.max(quality, 20)),
          width: targetW,
          height: targetH,
          workers: workerCount,
          workerScript: workerBlobURL
        };

        const gif = new GIF(gifOptions);
        statusDiv.textContent = t('statusProcessing', { workers: gifOptions.workers });

        const canvas = document.createElement('canvas');
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          const scale = Math.min(targetW / img.width, targetH / img.height);
          const scaledW = img.width * scale;
          const scaledH = img.height * scale;
          const offsetX = (targetW - scaledW) / 2;
          const offsetY = (targetH - scaledH) / 2;

          ctx.clearRect(0, 0, targetW, targetH);
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, targetW, targetH);
          ctx.drawImage(img, offsetX, offsetY, scaledW, scaledH);
          gif.addFrame(ctx, { copy: true, delay: delay });

          if (i % 10 === 0 || i === images.length - 1) {
            statusDiv.textContent = t('statusAddingFrames', { current: i+1, total: images.length });
            await new Promise(resolve => setTimeout(resolve, 0));
          }
        }

        gif.on('finished', blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = getNextFileName();
          a.click();
          URL.revokeObjectURL(url);
          statusDiv.textContent = t('statusSuccess', { size: (blob.size/1024).toFixed(1) });
          statusDiv.className = 'status success';
          generateBtn.disabled = false;
        });

        gif.render();

      } catch (err) {
        statusDiv.textContent = t('statusError', { message: err.message });
        statusDiv.className = 'status error';
        generateBtn.disabled = false;
        console.error(err);
      }
    });

    // 初始化
    updateNamingUI();
    applyLanguage();
    updateFileNamePreview();
  })();
</script>
</body>
</html>
