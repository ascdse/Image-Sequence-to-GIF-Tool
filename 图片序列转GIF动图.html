<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image-Sequence-to-GIF-Tool</title>
  <style>
    :root {
      --bg: #1e1e2f; --panel: #2a2a3d; --text: #e0e0e0; --text-secondary: #aaa;
      --accent: #6c63ff; --accent-hover: #5a52e0; --border: #3f3f5c;
      --input-bg: #1a1a2a; --drop-bg: rgba(255,255,255,0.02);
      --preview-bg: rgba(0,0,0,0.15); --status-bg: rgba(255,255,255,0.05);
      --file-name-bg: rgba(0,0,0,0.3);
      --main-preview-size: 275px; --preinput-preview-size: 100px;
      --gif-preview-max-h: 200px;
    }
    body.light-theme {
      --bg: #f5f5f5; --panel: #ffffff; --text: #333333; --text-secondary: #666666;
      --border: #e0e0e0; --input-bg: #f0f0f0; --drop-bg: rgba(0,0,0,0.02);
      --preview-bg: rgba(0,0,0,0.03); --status-bg: rgba(0,0,0,0.03);
      --file-name-bg: rgba(0,0,0,0.05);
    }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center;
      transition: background 0.3s, color 0.3s;
      user-select: none; overflow-y: auto; overflow-x: hidden;
    }
    .container {
      width: 100%; min-height: 100vh;
      display: flex; gap: 0; padding: 1.5rem; box-sizing: border-box;
    }
    .resizer {
      background: transparent; transition: background 0.2s;
      z-index: 10; pointer-events: none; flex-shrink: 0;
    }
    .resizer:hover, .resizer.active { background: var(--accent); }
    .resizer-horizontal { width: 100%; height: 6px; cursor: row-resize; }
    .resizer-vertical { width: 6px; cursor: col-resize; }
    .left-column { display: flex; flex-direction: column; min-width: 300px; }
    .right-column { display: flex; flex-direction: column; min-width: 250px; }
    .input-panel {
      flex: 5; min-height: 300px; display: flex; flex-direction: row;
      background: var(--panel); border-radius: 16px;
      padding: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: background 0.3s; gap: 1rem; overflow: hidden;
    }
    .preinput-panel {
      flex: 5; min-height: 300px; display: flex; flex-direction: column;
      background: var(--panel); border-radius: 16px;
      padding: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: background 0.3s;
    }
    .settings-panel {
      flex: 6; min-height: 300px; display: flex; flex-direction: column;
      background: var(--panel); border-radius: 16px;
      padding: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: background 0.3s; overflow-y: auto;
    }
    .preview-panel {
      flex: 4; min-height: 200px; display: flex; flex-direction: column; align-items: center;
      background: var(--panel); border-radius: 16px;
      padding: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: background 0.3s;
    }
    .drop-zone-wrapper { flex: 0 0 calc(16.666% - 1rem); display: flex; flex-direction: column; }
    .drop-zone {
      flex: 1; border: 2px dashed var(--border); border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s; background: var(--drop-bg);
      aspect-ratio: 1 / 1; padding: 0.5rem; text-align: center;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(108,99,255,0.05); }
    .file-count { margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.8rem; }
    .preview-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .preview-grid {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      flex: 1; overflow-y: auto; padding: 0.5rem;
      background: var(--preview-bg); border-radius: 8px; margin-top: 0.8rem;
      min-height: 150px;
    }
    .preview-item {
      position: relative; display: flex; flex-direction: column; align-items: center;
      cursor: grab; transition: transform 0.15s, border-color 0.15s;
      border: 2px solid transparent; border-radius: 6px; padding: 2px; user-select: none;
    }
    .preview-item.dragging { opacity: 0.4; transform: scale(0.95); }
    .preview-item.drag-over { border-color: var(--accent); transform: scale(1.05); }
    .preview-item:active { cursor: grabbing; }
    .preview-item img {
      width: var(--main-preview-size); height: var(--main-preview-size);
      object-fit: cover; border-radius: 4px;
    }
    .preview-item .delete-btn {
      position: absolute; top: -6px; right: -6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #e06c75; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; cursor: pointer; z-index: 5; transition: transform 0.15s;
    }
    .preview-item .delete-btn:hover { transform: scale(1.2); }
    .preview-item .index { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; text-align: center; }
    .preview-controls { display: flex; align-items: center; gap: 0.8rem; margin-top: 0.5rem; }
    .preview-controls label { font-size: 0.85rem; white-space: nowrap; }
    .preview-controls input[type="range"] { flex: 1; }
    h2 { font-size: 1.1rem; margin: 0 0 0.8rem 0; font-weight: 500; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .row { display: flex; align-items: center; gap: 0.8rem; margin: 0.6rem 0; }
    .row label { width: 90px; font-size: 0.85rem; flex-shrink: 0; }
    input, select { padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); flex: 1; min-width: 0; transition: background 0.3s, color 0.3s, border 0.3s; }
    button { padding: 0.5rem 0.8rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .generate-btn { width: 100%; padding: 0.8rem; font-size: 1rem; margin-top: 0.5rem; }
    .status { margin-top: 0.5rem; padding: 0.5rem; text-align: center; border-radius: 8px; font-size: 0.85rem; background: var(--status-bg); transition: background 0.3s; }
    .status.loading { background: rgba(108,99,255,0.15); color: #b3b3ff; }
    .status.success { background: rgba(76,175,132,0.15); color: #81c784; }
    .status.error { background: rgba(224,108,117,0.15); color: #ef9a9a; }
    .file-name-preview { background: var(--file-name-bg); border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin: 0.5rem 0; transition: background 0.3s, color 0.3s; }
    .top-buttons { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 0.5rem; gap: 0.5rem; flex-wrap: wrap; }
    .top-buttons button { background: var(--panel); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; gap: 0.3rem; }
    .top-buttons button:hover { background: var(--border); }
    .hidden { display: none; }
    .switch-row { display: flex; align-items: center; gap: 0.4rem; }
    .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
    .switch input { display: none; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: 0.3s; border-radius: 18px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: 0.3s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(14px); }
    .preinput-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .preinput-header span { font-size: 0.9rem; font-weight: 500; }
    .preinput-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; flex: 1; overflow-y: auto; padding: 0.3rem; background: var(--preview-bg); border-radius: 4px; margin-bottom: 0.5rem; }
    .preinput-item { display: flex; flex-direction: column; align-items: center; cursor: grab; user-select: none; }
    .preinput-item img { width: var(--preinput-preview-size); height: var(--preinput-preview-size); object-fit: cover; border-radius: 3px; border: 1px solid var(--border); }
    .preinput-item .file-name { font-size: 0.6rem; color: var(--text-secondary); max-width: var(--preinput-preview-size); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; display: none; }
    .preinput-grid.show-names .preinput-item .file-name { display: block; }
    .preinput-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .pagination { display: flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; }
    .pagination button { padding: 0.2rem 0.5rem; font-size: 0.8rem; }
    .gif-preview-container { width: 100%; text-align: center; background: var(--preview-bg); border-radius: 8px; padding: 0.5rem; margin-top: 0.5rem; flex: 1; display: flex; align-items: center; justify-content: center; }
    .gif-preview-container img { max-width: 100%; max-height: var(--gif-preview-max-h); border-radius: 4px; border: 1px solid var(--border); }
    .gif-placeholder { color: var(--text-secondary); font-size: 0.9rem; padding: 2rem 0; }
    .note-text { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; }

    @media (max-width: 1000px) {
      .container { flex-direction: column; }
      .left-column, .right-column { flex: none; width: 100% !important; }
      .input-panel { flex-direction: column; }
      .drop-zone-wrapper { flex: 0 0 auto; aspect-ratio: auto; }
      .drop-zone { aspect-ratio: auto; min-height: 100px; }
      .preview-area { width: 100%; }
      .resizer { display: none; }
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header h2 {
      margin: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .panel-header button {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="container" id="mainContainer">
  <div class="left-column" id="leftColumn" style="width:75%;">
    <div class="input-panel" id="inputPanel">
      <div class="drop-zone-wrapper">
        <div class="drop-zone" id="dropZone">
          <div>📁</div>
          <div style="font-size:0.8rem; margin-top:0.3rem;" data-i18n="dropTextShort">选择图片</div>
          <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        </div>
        <div class="file-count" id="fileCount"></div>
      </div>
      <div class="preview-area">
      <div class="panel-header">
        <h2 data-i18n="inputTitle">📁 文件序列</h2>
        <button id="clearSequenceBtn" data-i18n="clearSequence">🗑️ 清空序列</button>
      </div>
        <div class="preview-grid" id="previewGrid"></div>
        <div class="preview-controls">
          <label data-i18n="previewSize">🔍 预览大小</label>
          <input type="range" id="previewSize" min="30" max="300" value="275">
          <span id="previewSizeVal" style="font-size:0.8rem;">275px</span>
        </div>
      </div>
    </div>

    <div class="resizer resizer-horizontal" id="resizerH"></div>

    <div class="preinput-panel" id="preinputPanel">
      <div class="preinput-header">
        <span data-i18n="preinputTitle">📥 预输入文件 (监控)</span>
        <label class="switch">
          <input type="checkbox" id="preinputToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="note-text" data-i18n="monitorNote">⚠️ 不建议长时间开启监控，可能导致卡顿。</div>
      <div class="row">
        <label data-i18n="preinputSize">缩略图大小</label>
        <input type="range" id="preinputSizeSlider" min="20" max="300" value="100">
        <span id="preinputSizeVal" style="font-size:0.8rem;">100px</span>
      </div>
      <div class="switch-row" style="margin-bottom: 0.5rem;">
        <label class="switch"><input type="checkbox" id="showNamesToggle"><span class="slider"></span></label>
        <span style="font-size:0.75rem; color: var(--text-secondary);" data-i18n="showNames">显示文件名</span>
      </div>
      <div class="preinput-actions">
        <div class="pagination">
          <button id="prevPageBtn">◀</button><span id="pageInfo">1/1</span><button id="nextPageBtn">▶</button>
        </div>
        <label style="font-size:0.8rem; margin-left:0.5rem;">
          <span data-i18n="pageSizeLabel">每页</span>
          <input type="number" id="pageSizeInput" value="10" min="1" max="100" step="1" style="width:50px; padding:0.2rem;">
        </label>
        <button id="addAllPendingBtn" data-i18n="addAllPending">➕ 全部添加</button>
        <button id="clearPendingBtn" data-i18n="clearPending">🗑️ 清空</button>
      </div>
      <div class="row" style="margin-top:0.3rem;">
        <label data-i18n="sortBy">排序</label>
        <select id="sortBySelect">
          <option value="name" data-i18n="sortName">名称</option>
          <option value="size" data-i18n="sortSize">大小</option>
          <option value="time" data-i18n="sortTime">时间</option>
        </select>
        <button id="sortOrderBtn" data-i18n="sortAsc">升序 ↑</button>
      </div>
      <div class="preinput-grid" id="preinputGrid"></div>
      <div style="font-size:0.7rem; color: var(--text-secondary); margin-top:4px;" id="preinputCount"></div>
    </div>
  </div>

  <div class="resizer resizer-vertical" id="resizerV"></div>

  <div class="right-column" id="rightColumn" style="width:25%;">
    <div class="settings-panel" id="settingsPanel">
      <div class="top-buttons">
        <button id="layoutBtn" data-i18n="layoutBtn"></button>
        <button id="resetLayoutBtn" data-i18n="resetLayoutBtn"></button>
        <button id="langToggleBtn"><span id="langIcon">🌐</span> <span id="langText">EN</span></button>
        <button id="themeToggleBtn"><span id="themeIcon">☀️</span> <span id="themeText">浅色</span></button>
      </div>
      <h2 data-i18n="settingsTitle">⚙️ 合成设置</h2>
      <div class="row"><label data-i18n="fps">帧率 (fps)</label><input type="number" id="fps" value="10" min="1" max="30"></div>
      <div class="row"><label data-i18n="quality">质量 (1-30)</label><input type="range" id="quality" min="1" max="30" value="15"><span id="qualityVal" style="font-size:0.8rem;">15</span></div>
      <div class="row"><label data-i18n="workers">线程数</label><input type="number" id="workers" min="1" max="16" value="4" placeholder="自动"><span style="font-size:0.75rem; color: var(--text-secondary);" data-i18n="workersHint">建议4-8</span></div>
      <div class="row"><label data-i18n="loopFrames">前N帧重复</label><input type="number" id="loopFrames" value="0" min="0" max="999" step="1" placeholder="帧数"><span style="font-size:0.7rem; color: var(--text-secondary);" data-i18n="framesUnit">帧数</span></div>
      <div class="row" style="margin-top:-0.3rem;"><label data-i18n="loopRepeat">重复次数</label><input type="number" id="loopRepeat" value="1" min="1" max="99" step="1" placeholder="次数"><span style="font-size:0.7rem; color: var(--text-secondary);" data-i18n="repeatHint">(含原本)</span></div>
      <h2 style="margin-top:1rem;" data-i18n="namingTitle">🏷️ 文件命名</h2>
      <div class="switch-row" style="margin-bottom: 0.5rem;">
        <label class="switch"><input type="checkbox" id="namingToggle" checked><span class="slider"></span></label>
        <span style="font-size:0.85rem;" data-i18n="enableNamingRule">启用命名规则</span>
      </div>
      <div id="ruleMode">
        <div class="row"><label data-i18n="baseName">基础名称</label><input type="text" id="baseName" value="成品" maxlength="50"></div>
        <div class="row"><label data-i18n="startSeq">起始序号</label><input type="number" id="startSeq" value="1" min="1" max="9999" step="1"></div>
        <div class="file-name-preview" id="fileNamePreviewRule"></div>
        <div style="display: flex; gap: 0.5rem;">
          <button id="resetNamingBtn" data-i18n="resetSeq">🔄 重置序号</button>
          <span style="font-size:0.7rem; color: var(--text-secondary); align-self:center;" data-i18n="resetHint">重置后下一个文件将从起始序号开始</span>
        </div>
      </div>
      <div id="fixedMode" class="hidden">
        <div class="row"><label data-i18n="fixedFileName">固定文件名</label><input type="text" id="fixedFileName" value="动画" maxlength="50"><span style="font-size:0.7rem; color: var(--text-secondary);">.gif</span></div>
        <div class="file-name-preview" id="fileNamePreviewFixed"></div>
      </div>
      <button id="generateBtn" class="generate-btn" disabled data-i18n="generateBtn">合成 GIF</button>
      <div class="status" id="status"></div>
    </div>

    <div class="resizer resizer-horizontal" id="resizerH2"></div>

    <div class="preview-panel" id="previewPanel">
      <h2 data-i18n="previewTitle">🎬 成品预览</h2>
      <div class="gif-preview-container" id="gifPreviewContainer">
        <div class="gif-placeholder" data-i18n="noPreview">尚未生成 GIF</div>
        <img id="gifPreviewImg" style="display: none;" alt="GIF preview" />
      </div>
      <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; width: 100%;">
        <button id="previewBtn" style="flex:1;" data-i18n="previewBtn">👁 预览</button>
        <button id="resetPreviewBtn" style="flex:1;" data-i18n="resetPreviewBtn">🔄 重置</button>
      </div>
    </div>
  </div>
</div>

<script src="gif.js"></script>
<script>

        const onMouseMove = (e2) => {

          if (newAbove < 150) newAbove = 150;

          panelAbove.style.height = newAbove + 'px';
          panelBelow.style.height = newBelow + 'px';

        const onMouseUp = () => {
          resizer.classList.remove('active');
          document.removeEventListener('mousemove', onMouseMove);

    // 监控逻辑
    async function scanFolder() {
      if (!folderHandle || !preinputToggle.checked) return;
      try {
        const permission = await folderHandle.queryPermission({ mode: 'read' });
        if (permission !== 'granted') {
          const newPerm = await folderHandle.requestPermission({ mode: 'read' });
          if (newPerm !== 'granted') { stopMonitoring(); return; }
        }
        const newFiles = [];
        for await (const entry of folderHandle.values()) {
          if (entry.kind === 'file' && entry.name.match(/\.(jpg|jpeg|png|bmp|webp)$/i)) {
            if (!knownFileNames.has(entry.name)) {
              const file = await entry.getFile();
              if (file.type.startsWith('image/')) { newFiles.push(file); knownFileNames.add(entry.name); }
            }
          }
        }
        if (newFiles.length > 0) {
          pendingFiles.push(...newFiles);
          if (currentPage > getTotalPages()) currentPage = getTotalPages();
          renderPendingGrid();
        }
      } catch (err) { stopMonitoring(); }
    }

    async function generateGif(download = true) {
      if (selectedFiles.length === 0) return;
      const fps = parseInt(fpsInput.value) || 10;
      const quality = parseInt(qualityInput.value) || 15;
      const delay = Math.round(1000 / fps);
      let workerCount = parseInt(workersInput.value);
      if (isNaN(workerCount) || workerCount < 1) workerCount = Math.max(1, (navigator.hardwareConcurrency || 4) - 1);
      const loopFramesNum = parseInt(loopFramesInput.value) || 0;
      const loopRepeat = parseInt(loopRepeatInput.value) || 1;

      let finalFiles = [...selectedFiles];
      if (loopFramesNum > 0 && loopFramesNum <= selectedFiles.length && loopRepeat > 1) {
        const head = selectedFiles.slice(0, loopFramesNum);
        const tail = selectedFiles.slice(loopFramesNum);
        finalFiles = [];
        for (let i = 0; i < loopRepeat; i++) finalFiles.push(...head);
        finalFiles.push(...tail);
      }

      statusDiv.textContent = t('statusLoading'); statusDiv.className = 'status loading';
      generateBtn.disabled = true; previewBtn.disabled = true;

      try {
        const images = await Promise.all(finalFiles.map(file => {
          return new Promise((resolve, reject) => {
            const img = new Image(); img.onload = () => resolve(img); img.onerror = reject;
            img.src = URL.createObjectURL(file);
          });
        }));

        const targetW = images[0].naturalWidth;
        const targetH = images[0].naturalHeight;

        const gifOptions = {
          quality: Math.min(30, Math.max(quality, 20)),
          width: targetW, height: targetH,
          workers: workerCount,
          workerScript: workerBlobURL
        };

        const gif = new GIF(gifOptions);
        statusDiv.textContent = t('statusProcessing', { workers: gifOptions.workers });

        const canvas = document.createElement('canvas');
        canvas.width = targetW; canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          const scale = Math.min(targetW / img.width, targetH / img.height);
          const scaledW = img.width * scale;
          const scaledH = img.height * scale;
          const offsetX = (targetW - scaledW) / 2;
          const offsetY = (targetH - scaledH) / 2;

          ctx.clearRect(0, 0, targetW, targetH);
          ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, targetW, targetH);
          ctx.drawImage(img, offsetX, offsetY, scaledW, scaledH);
          gif.addFrame(ctx, { copy: true, delay: delay });

          if (i % 10 === 0 || i === images.length - 1) {
            statusDiv.textContent = t('statusAddingFrames', { current: i+1, total: images.length });
            await new Promise(resolve => setTimeout(resolve, 0));
          }
        }

        gif.on('finished', blob => {
          const url = URL.createObjectURL(blob);
          if (gifPreviewImg.src) URL.revokeObjectURL(gifPreviewImg.src);
          gifPreviewImg.src = url; gifPreviewImg.style.display = 'block';
          placeholderDiv.style.display = 'none';

          if (download) {
            const a = document.createElement('a'); a.href = url; a.download = getNextFileName(); a.click();
            statusDiv.textContent = t('statusSuccess', { size: (blob.size/1024).toFixed(1) });
          } else {
            statusDiv.textContent = '👁 预览生成成功';
          }
          statusDiv.className = 'status success';
          generateBtn.disabled = false; previewBtn.disabled = false;
        });

        gif.render();

      } catch (err) {
        statusDiv.textContent = t('statusError', { message: err.message });
        statusDiv.className = 'status error';
        generateBtn.disabled = false; previewBtn.disabled = false;
        console.error(err);
      }
    }

    function initAll() {
      updateNamingUI(); applyLanguage(); updateFileNamePreview(); renderPendingGrid();
      placeholderDiv.style.display='block'; gifPreviewImg.style.display='none';
      document.documentElement.style.setProperty('--main-preview-size', previewSizeInput.value+'px');
      previewSizeVal.textContent = previewSizeInput.value+'px';
      previewSizeInput.addEventListener('input', () => {
        const size = previewSizeInput.value+'px';
        previewSizeVal.textContent = size;
        document.documentElement.style.setProperty('--main-preview-size', size);
      });
      qualityInput.addEventListener('input', () => qualityVal.textContent = qualityInput.value);
      updateSortButtonText();
      applyDefaultFlex();
    }

    initAll();
  })();
</script>
</body>
</html>
